# Fly.io config for the NodeTool server.
#
# This mirrors the Docker production deploy (deploy.sh) but on Fly.io:
#   - Runs the SAME published image: ghcr.io/nodetool-ai/nodetool:latest
#     (self-contained — web/dist + workflow examples are baked in).
#   - All state lives in Supabase: Postgres DB (DATABASE_URL), asset storage
#     (NODETOOL_STORAGE_BACKEND=supabase), and auth (AUTH_PROVIDER=supabase).
#     So the container is stateless and needs no volume.
#   - Fly terminates TLS at the edge (like Cloudflare did for the Docker box),
#     so the origin runs plain HTTP on 7777 (no TLS_CERT/TLS_KEY set).
#
# Secrets (DATABASE_URL, SUPABASE_URL/KEY, SECRETS_MASTER_KEY, SERPAPI_API_KEY,
# provider keys, …) are set with `fly secrets set`, NOT baked here.
#
# Deploy:  fly deploy --image ghcr.io/nodetool-ai/nodetool:latest

app = "nodetool"
primary_region = "fra"   # next to the Supabase DB (aws eu-central-1 / Frankfurt)

[build]
  image = "ghcr.io/nodetool-ai/nodetool:latest"

[env]
  HOST = "0.0.0.0"
  PORT = "7777"
  NODETOOL_ENV = "production"
  STATIC_FOLDER = "/app/web/dist"
  # Migrations run once per release in the release_command VM below, not on
  # every app-machine boot. Without this, each machine started during a rolling
  # deploy (or a scale-up) would re-enter the migrator and contend on the
  # migration lock — a slow migration could time the lock out and crash-loop a
  # second machine. One release-phase run avoids that entirely.
  NODETOOL_MIGRATE_ON_BOOT = "0"

# Fly runs release_command once, in a temporary machine on the new image,
# BEFORE any app machine is updated — and aborts the deploy if it exits
# non-zero. So a bad migration blocks the release instead of shipping code that
# 500s against an un-migrated schema. Uses the same image + DATABASE_URL secret;
# db-migrate.mjs takes the migration lock, so it's safe regardless.
[deploy]
  release_command = "node /app/scripts/db-migrate.mjs"

[http_service]
  internal_port = 7777
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    interval = "15s"
    timeout = "10s"
    grace_period = "40s"
    method = "GET"
    path = "/health"

# Sized to match the Docker deploy (--memory=4g --cpus=2).
[[vm]]
  size = "shared-cpu-2x"
  memory = "4gb"
