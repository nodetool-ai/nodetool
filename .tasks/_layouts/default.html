<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}" />
    <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}" />
    {%- seo -%}
  </head>
  <body>
    <header class="site-header">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav>
        <a href="{{ '/' | relative_url }}">Dashboard</a>
        <a href="{{ '/plans/' | relative_url }}">Plans</a>
        <a href="{{ '/tasks/' | relative_url }}">Tasks</a>
      </nav>
    </header>
    <main class="container">
      {{ content }}
    </main>
    <footer class="site-footer">
      <p>
        Source in <code>.tasks/</code> &middot;
        <a href="https://github.com/nodetool-ai/nodetool/tree/main/.tasks">edit on GitHub</a>
      </p>
    </footer>
  </body>
</html>
