title: NodeTool Tasks
description: >-
  Plans and tasks for developing NodeTool. Markdown-native, git-versioned,
  designed for parallel work by humans and AI agents without merge conflicts.
baseurl: "/tasks"
url: ""

markdown: kramdown
permalink: pretty

collections:
  plans:
    output: true
    permalink: /plans/:path/
    sort_by: id
  tasks:
    output: true
    permalink: /tasks/:path/
    sort_by: id

defaults:
  - scope:
      path: ""
      type: plans
    values:
      layout: plan
  - scope:
      path: ""
      type: tasks
    values:
      layout: task

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .jekyll-cache
  - SCHEMA.md
  - AGENTS.md
  - README.md
  - node_modules

kramdown:
  input: GFM
  syntax_highlighter: rouge
