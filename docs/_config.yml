# Site settings
title: NodeTool Documentation
description: >-
  Local-first visual environment for building and running AI workflows.
  Build agents visually, deploy anywhere, privacy by design.
baseurl: "" # the subpath of your site, e.g. /docs
url: "https://docs.nodetool.ai" # the base hostname & protocol for your site

# Build settings
markdown: kramdown
# Using custom theme - no remote theme

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-relative-links
  - jekyll-optional-front-matter
  - jekyll-readme-index
  - jekyll-titles-from-headings
  - jekyll-mermaid

# Plugin settings
relative_links:
  enabled: true
  collections: false

optional_front_matter:
  remove_originals: false

readme_index:
  enabled: true
  remove_originals: false

titles_from_headings:
  enabled: true
  strip_title: false
  collections: false

# Navigation (sidebar source of truth lives in _includes/sidebar.html;
# this list mirrors section order for plugins and sitemap output)
header_pages:
