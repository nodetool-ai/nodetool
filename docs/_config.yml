# Collections (optional, for organizing docs)
# collections:
#   guides:
#     output: true
#     permalink: /:collection/:name

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/

# Custom theme settings
# Using custom futuristic dark theme located in _layouts, _includes, and assets

# Kramdown settings
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

mermaid:
  src: https://cdn.jsdelivr.net/npm/mermaid@11.12.1/dist/mermaid.min.js
