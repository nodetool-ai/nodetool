# Site settings
title: NodeTool Documentation
description: >-
  Local-first visual environment for building and running AI workflows.
  Build agents visually, deploy anywhere, privacy by design.
baseurl: "" # the subpath of your site, e.g. /docs
url: "https://docs.nodetool.ai" # the base hostname & protocol for your site

# Build settings
markdown: kramdown
# Using custom theme - no remote theme

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-relative-links
  - jekyll-optional-front-matter
  - jekyll-readme-index
  - jekyll-titles-from-headings
  # Note: Mermaid is handled by the local _plugins/mermaid.rb tag (the gem
  # double-loaded the script). The CDN URL lives under `mermaid.src` below.

# Social / SEO defaults (consumed by jekyll-seo-tag)
logo: /assets/logo.png
twitter:
  card: summary_large_image
social:
  name: NodeTool
  links:
    - https://github.com/nodetool-ai/nodetool
    - https://discord.gg/WmQTWZRcYE

# Default Open Graph / Twitter card image for every page. jekyll-seo-tag only
# reads a *page-level* `image`, so we set one site-wide via front-matter
# defaults; individual pages can override with their own `image:`.
defaults:
  - scope:
      path: ""
    values:
      image: /assets/home.png
  # Node reference pages are pure generated Markdown. Some node descriptions
  # legitimately contain `{{ variable }}` / `{% ... %}` template syntax, which
  # Jekyll would otherwise try to parse as Liquid (and warn/err on). They need
  # no Liquid, so turn it off for the whole tree.
  - scope:
      path: "nodes"
    values:
      render_with_liquid: false

# Plugin settings
relative_links:
  enabled: true
  collections: false

optional_front_matter:
  remove_originals: false

readme_index:
  enabled: true
  remove_originals: false

titles_from_headings:
  enabled: true
  strip_title: false
  collections: false

# Navigation: the single source of truth is _includes/sidebar.html.
# The custom theme does not use Jekyll's Minima-only `header_pages`, and
# jekyll-sitemap already includes every page, so no mirrored list is kept here
# (it only drifted out of sync with the sidebar).

# Collections (optional, for organizing docs)
# collections:
#   guides:
#     output: true
#     permalink: /:collection/:name

# Exclude from processing
exclude:
  # Build tooling
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  # Contributor / engineering docs — kept in the repo (referenced by CLAUDE.md),
  # but NOT published to docs.nodetool.ai. These are not user-facing.
  - README.md
  - AGENTS.md
  - DESIGN.md
  - DEVELOPMENT_STANDARDS.md
  - THEME.md
  - CLOUD_NODE_CURATION.md
  - AGENT_CLI_QUICKREF.md
  - runtime-package-interface.md
  # Internal product/design specs (PRDs, drafts) — not for the public site.
  - STUDIO_PRD.md
  - STUDIO_MVP_PROMPT.md
  - image-editor-prd.md
  - timeline-editor-prd.md
  - correlation-design.md
  # Internal implementation plans & specs (agentic-worker instructions).
  - superpowers/

# Custom theme settings
# Using custom futuristic dark theme located in _layouts, _includes, and assets

# Kramdown settings
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

mermaid:
  src: https://cdn.jsdelivr.net/npm/mermaid@11.12.1/dist/mermaid.min.js
