# Reference Docker Compose for self-hosting the NodeTool server.
#
# Quick start:
#   1. cp .env.example .env      # then fill in the provider keys you use
#   2. docker compose up -d
#   3. open http://localhost:17777
#
# The server binds to 0.0.0.0:7777 inside the container and is published on the
# host as ${NODETOOL_PORT:-17777}. All persistent state — SQLite database,
# assets, vector store, model cache, and the generated secret key — lives under
# /workspace, backed by the named `nodetool-data` volume, so it survives
# restarts and image upgrades.
#
# ############################################################################
# ##  🔒🔒🔒  SECURITY — DO NOT EXPOSE THIS TO THE INTERNET AS-IS  🔒🔒🔒   ##
# ############################################################################
# ##  This file runs in LOCAL MODE: NO LOGIN, NO PASSWORD. Every request     ##
# ##  from a trusted network runs as the single ADMIN user "1" with full     ##
# ##  access to your workflows, files, stored secrets, and API keys.         ##
# ##                                                                          ##
# ##  Safe on a laptop / private LAN / VPN. BEFORE putting this on a public   ##
# ##  IP or sharing with untrusted users you MUST enable Supabase auth (see   ##
# ##  the Authentication section below) OR keep the port firewalled.         ##
# ##  See the NODETOOL_TRUST_LOCAL_NETWORKS warning below.                    ##
# ############################################################################

name: nodetool

services:
  nodetool:
    image: ghcr.io/nodetool-ai/nodetool:${NODETOOL_VERSION:-latest}
    container_name: nodetool
    restart: unless-stopped
    ports:
      # ⚠️  Published on 0.0.0.0 — reachable from your whole LAN. In Local mode
      # that means no-login admin access to anyone who can hit this port. To
      # restrict it to just this machine, bind to loopback:
      #     - "127.0.0.1:${NODETOOL_PORT:-17777}:7777"
      - "${NODETOOL_PORT:-17777}:7777"
    volumes:
      - nodetool-data:/workspace
    environment:
      # Bind on all interfaces so the published host port reaches the server.
      HOST: "0.0.0.0"
      PORT: "7777"
      NODETOOL_ENV: "production"

      # Keep every persistent path on the /workspace volume.
      DB_PATH: "/workspace/nodetool.sqlite3"
      VECTORSTORE_DB_PATH: "/workspace/vectorstore.db"
      ASSET_FOLDER: "/workspace/assets"
      HF_HOME: "/workspace/hf-cache"

      # 32-byte base64 key that encrypts stored secrets. If unset, one is
      # generated and persisted to /workspace/.secrets_master_key on first run.
      # Set it explicitly in production: openssl rand -base64 32
      # SECRETS_MASTER_KEY: "${SECRETS_MASTER_KEY:-}"

      # ── Authentication / login screen ──────────────────────────────────────
      # Configured entirely on the backend — the web UI reads its auth mode and
      # public Supabase credentials at runtime from GET /api/config, so no image
      # rebuild is needed to turn login on or off.
      #
      # Disabled by default: with SUPABASE_URL/SUPABASE_KEY unset the server
      # runs in "Local mode" — no login screen is shown and trusted requests run
      # as a single user "1".
      #
      # In Local mode the server only trusts a request when its *source IP* is
      # trusted. Loopback (127.0.0.1/::1) always is — but Docker NATs a
      # published-port connection to the bridge gateway (e.g. 172.17.0.1), so it
      # never arrives from loopback. Without the setting below every API/WS call
      # returns 401 "Remote access requires authentication" even though the UI
      # loads.
      #
      # ┌────────────────────────────────────────────────────────────────────┐
      # │  ⚠️⚠️⚠️  DANGER: NODETOOL_TRUST_LOCAL_NETWORKS BYPASSES LOGIN  ⚠️⚠️⚠️  │
      # ├────────────────────────────────────────────────────────────────────┤
      # │  Every source IP in this list is trusted as admin user "1" with NO  │
      # │  password. ANYONE who can reach the published port from one of      │
      # │  these ranges gets full control of your data, secrets & API keys.   │
      # │                                                                     │
      # │  172.16.0.0/12  ✅ DEFAULT — Docker's bridge range. Host + LAN       │
      # │                    clients reach the app through the port mapping,  │
      # │                    but nothing off the Docker bridge is trusted.    │
      # │                                                                     │
      # │  0.0.0.0/0      🚫 DO NOT USE on a public IP. Trusts EVERY source —  │
      # │                    the entire internet if the port is reachable.    │
      # │                    Only on a network you fully control (LAN / VPN). │
      # │                                                                     │
      # │  🔒 Exposing NodeTool publicly or to untrusted users? Do NOT widen  │
      # │     this list — enable real logins with Supabase auth below.        │
      # └────────────────────────────────────────────────────────────────────┘
      NODETOOL_TRUST_LOCAL_NETWORKS: "${NODETOOL_TRUST_LOCAL_NETWORKS:-172.16.0.0/12}"

      # To require login (multi-user or remote access), point these at your
      # Supabase project. The server enforces a valid Supabase JWT on every
      # request and the web UI shows the login screen. SUPABASE_KEY is the
      # service-role key (server-only, never sent to the browser);
      # SUPABASE_ANON_KEY is the public key the login screen uses. See
      # docs/supabase-deployment.md and docs/authentication.md.
      # SUPABASE_URL: "${SUPABASE_URL:-}"
      # SUPABASE_KEY: "${SUPABASE_KEY:-}"
      # SUPABASE_ANON_KEY: "${SUPABASE_ANON_KEY:-}"
      # Optional OAuth redirect when served behind a domain/proxy:
      # AUTH_REDIRECT_URL: "${AUTH_REDIRECT_URL:-}"

      # Model provider keys — only the ones you use. Values come from .env.
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      FAL_API_KEY: "${FAL_API_KEY:-}"
      HF_TOKEN: "${HF_TOKEN:-}"

      # Local inference backends — point these at your own services if you run
      # them (e.g. an Ollama container on the same Docker network).
      # OLLAMA_API_URL: "http://ollama:11434"

volumes:
  nodetool-data:
