# Flatpak Manifest for NodeTool
# 
# This manifest defines how to build NodeTool as a Flatpak application.
# It follows the requirements for independent CI workflow with:
# - Explicit runtime and SDK declarations
# - Pinned Electron and Node versions
# - Minimum permissions declared explicitly
# - Build from source, not prebuilt AppImages
# - x86_64 architecture support

app-id: ai.nodetool.NodeTool
branch: stable
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '24.08'
command: nodetool

# Supported architectures - x86_64 only initially
# Future: add aarch64 support
build-options:
  arch:
    x86_64: {}

# Explicit permission declarations
# These are the minimum required permissions for NodeTool to function
finish-args:
  # Display protocols
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  
  # GPU acceleration for AI workloads
  - --device=dri
  
  # Audio input/output for multimedia processing
  - --socket=pulseaudio
  
  # Network access for:
  # - API calls to cloud AI services
  # - Model downloads from HuggingFace
  # - Backend communication
  - --share=network
  
  # Filesystem access for:
  # - User projects and workflows
  # - Asset storage
  # - Configuration files
  - --filesystem=home
  
  # System integration
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=com.canonical.AppMenu.Registrar
  - --talk-name=org.freedesktop.portal.Desktop
  
  # Device access for:
  # - Microphone (audio recording features)
  # - Camera (video recording features)
  - --device=all
  
  # Environment variables
  - --env=ELECTRON_TRASH=gio
  - --env=NODE_ENV=production

# Build modules
modules:
  # libsecret: required by the `keytar` native module that our security package
  # uses for system keychain access. The Freedesktop SDK 24.08 does not ship
  # libsecret development files, so the keytar prebuild fallback (`node-gyp
  # rebuild`) fails with `Package 'libsecret-1' not found`. Building libsecret
  # here provides both the .pc file at build time and the runtime .so.
  - name: libsecret
    buildsystem: meson
    config-opts:
      - -Dmanpage=false
      - -Dvapi=false
      - -Dgtk_doc=false
      - -Dintrospection=false
      - -Dtpm2=false
    cleanup:
      - /include
      - /lib/pkgconfig
    sources:
      - type: archive
        url: https://download.gnome.org/sources/libsecret/0.21/libsecret-0.21.4.tar.xz
        sha256: 163d08d783be6d4ab9a979ceb5a4fecbc1d9660d3c34168c581301cd53912b20

  # Node.js runtime required to build the web frontend and electron app.
  # Installed as a build-time dependency only (cleanup removes it from the final app).
  - name: nodejs
    buildsystem: simple
    cleanup:
      - '*'
    build-commands:
      - mkdir -p /app/bin /app/lib /app/include
      - cp -r bin/node bin/npm bin/npx /app/bin/
      - cp -r lib/node_modules /app/lib/
      - cp -r include/* /app/include/
      - cp include/node/common.gypi /app/common.gypi
    sources:
      - type: archive
        url: https://nodejs.org/dist/v22.22.1/node-v22.22.1-linux-x64.tar.xz
        sha256: 9a6bc82f9b491279147219f6a18add1e18424dce90d41d2a5fcd69d4924ba3aa
        strip-components: 1
        only-arches:
          - x86_64

  # Main NodeTool application
  - name: nodetool
    buildsystem: simple
    build-options:
      # Allow network access so npm can download packages during the build
      build-args:
        - --share=network
      env:
        # Node environment
        NPM_CONFIG_CACHE: /run/build/nodetool/npm-cache
        npm_config_cache: /run/build/nodetool/npm-cache
        # Use the headers from the Node.js module instead of downloading and
        # extracting them in CI.  node-gyp's tar extraction can fail under
        # flatpak-builder's overlay/container filesystem when it tries fchown.
        npm_config_nodedir: /app
        npm_config_tar_ignore_ownership: 'true'
        npm_config_unsafe_perm: 'true'
        ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
    build-commands:
      # Install all workspace dependencies from the monorepo root.
      # web/ and electron/ are npm workspaces and have no individual
      # package-lock.json — running `npm ci` in those subdirectories fails
      # with "ci command can only install with an existing package-lock.json".
      - npm ci

      # Build the backend packages that web and electron depend on
      # (protocol, websocket, etc.) before bundling the frontend.
      - npm run build:packages

      # Build web frontend
      - npm run build --workspace=web

      # Build electron renderer + main/preload bundles via vite
      - npm run vite:build --workspace=electron

      # Create application directory
      - mkdir -p /app/nodetool

      # Copy built application. Use the hoisted root node_modules — with npm
      # workspaces most runtime dependencies live there, not in
      # electron/node_modules.
      - cp -r electron/dist-electron /app/nodetool/
      - cp -r web/dist /app/nodetool/dist-web
      - cp -r electron/assets /app/nodetool/
      - cp -r electron/resources /app/nodetool/
      - cp -rL node_modules /app/nodetool/node_modules
      - cp electron/package.json /app/nodetool/
      
      # Install wrapper script
      - install -Dm755 electron/flatpak-wrapper.sh /app/bin/nodetool
      
      # Install desktop integration files
      - install -Dm644 electron/resources/ai.nodetool.NodeTool.desktop /app/share/applications/ai.nodetool.NodeTool.desktop
      - install -Dm644 electron/resources/ai.nodetool.NodeTool.metainfo.xml /app/share/metainfo/ai.nodetool.NodeTool.metainfo.xml
      
      # Install icons
      - |
        for size in 16 24 32 48 64 128 256 512; do
          if [ -f "electron/resources/linux_icons/icon_${size}x${size}.png" ]; then
            install -Dm644 "electron/resources/linux_icons/icon_${size}x${size}.png" \
              "/app/share/icons/hicolor/${size}x${size}/apps/ai.nodetool.NodeTool.png"
          fi
        done
    
    sources:
      # Main repository - path is relative to manifest location (electron/),
      # so '..' points to the repository root containing both web/ and electron/
      - type: dir
        path: ..
