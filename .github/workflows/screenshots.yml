name: Documentation Screenshots

on:
  # Run manually from the Actions tab
  workflow_dispatch:
    inputs:
      force:
        description: "Re-capture every screenshot (even existing ones)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

# Write access is required so the workflow can commit newly captured
# screenshots back to the branch after the Playwright run.
permissions:
  contents: write

jobs:
  screenshots:
    name: Capture screenshots
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # Fetch the full ref so we can push back to the triggering branch.
          ref: ${{ github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build workspace packages
        run: npm run build:packages

      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install chromium --with-deps

      - name: Run screenshot tests
        working-directory: web
        env:
          # Pass the force flag through so screenshots:force logic works
          FORCE_SCREENSHOTS: ${{ inputs.force }}
          # Use the same deterministic test-only master key that is already
          # committed in web/tests/globalSetup.ts (base64 for the literal string
          # "SCREENSHOT_TEST_KEY_DO_NOT_USE!!").  It is intentionally not a real
          # secret: it exists only so the screenshot backend can boot without a
          # keychain on headless CI runners.  Never use this value in production.
          SECRETS_MASTER_KEY: "U0NSRUVOU0hPVF9URVNUX0tFWV9ET19OT1RfVVNFISE="
        run: npx playwright test tests/benchmarks/screenshots.spec.ts --project=chromium

      - name: Commit screenshots to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/assets/screenshots/
          if git diff --cached --quiet; then
            echo "No new or changed screenshots to commit."
          else
            git commit -m "chore: update documentation screenshots [skip ci]"
            git push
          fi

      - name: Upload screenshots as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: documentation-screenshots
          path: docs/assets/screenshots/
          retention-days: 30

      - name: Upload Playwright report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
