name: Test

on:
  push:
    branches:
      - main
    paths:
      - "web/**"
      - "electron/**"
      - "packages/**"
      - "mobile/**"
      - "examples/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "tsconfig.*.json"
      - "turbo.json"
      - ".nvmrc"
      - ".github/workflows/test.yml"
      - ".github/workflows/quality-checks.yml"
  pull_request:
    branches:
      - main
    paths:
      - "web/**"
      - "electron/**"
      - "packages/**"
      - "mobile/**"
      - "examples/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "tsconfig.*.json"
      - "turbo.json"
      - ".nvmrc"
      - ".github/workflows/test.yml"
      - ".github/workflows/quality-checks.yml"

jobs:
  quality:
    name: Quality Gate (npm run check)
    uses: ./.github/workflows/quality-checks.yml
    with:
      fail-fast: true
      skip-tests: false

  integration:
    name: Workflow Integration Tests
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install system libraries for keytar
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-0

      - name: Install all workspace dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

      - name: Rebuild native modules
        run: npm rebuild better-sqlite3

      - name: Build backend packages
        run: npm run build:packages

      - name: Run shipped-workflow execution tests
        run: npm run test:integration
