name: Docker — sandbox-agent

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'
    paths:
      - 'packages/sandbox-agent/**'
      - 'packages/sandbox/**'
      - 'packages/config/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.base.json'
      - 'tsconfig.build.json'
      - 'scripts/**'
      - '.github/workflows/docker-sandbox-agent.yml'

jobs:
  docker-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Required by docker/build-push-action for OCI provenance / SBOM
      # attestations pushed alongside the image to GHCR.
      id-token: write
      attestations: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          # Use repository_owner instead of github.actor so the login identity
          # is stable regardless of which user triggered the push. The token
          # itself is what authorizes the push; username is informational.
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/nodetool-ai/sandbox-agent
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-,enable=${{ !startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/sandbox-agent/docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/nodetool-ai/sandbox-agent:buildcache
          cache-to: type=registry,ref=ghcr.io/nodetool-ai/sandbox-agent:buildcache,mode=max
          # Disable provenance/SBOM attestations. They create extra manifest
          # entries that fail with "permission_denied: write_package" on first
          # push of a new GHCR package. Re-enable once the package exists and
          # the repository is linked under Package settings > Manage Actions
          # access.
          provenance: false
          sbom: false
