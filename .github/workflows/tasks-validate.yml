name: Validate tasks

on:
  pull_request:
    paths:
      - ".tasks/**"
      - "scripts/tasks.mjs"
      - ".github/workflows/tasks-validate.yml"
  push:
    branches: [main]
    paths:
      - ".tasks/**"
      - "scripts/tasks.mjs"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: .tasks/site/package-lock.json
      - name: Validate plans and tasks
        run: node scripts/tasks.mjs validate
      - name: Install site deps
        run: npm ci
        working-directory: .tasks/site
      - name: Typecheck site
        run: npm run typecheck
        working-directory: .tasks/site
      - name: Build site
        run: npm run build
        working-directory: .tasks/site
