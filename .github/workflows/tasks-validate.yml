name: Validate tasks site

on:
  pull_request:
    paths:
      - ".tasks/**"
      - ".github/workflows/tasks-validate.yml"
  push:
    branches: [main]
    paths:
      - ".tasks/**"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: .tasks/site/package-lock.json
      - name: Install
        run: npm ci
        working-directory: .tasks/site
      - name: Typecheck
        run: npm run typecheck
        working-directory: .tasks/site
      - name: Test
        run: npm test
        working-directory: .tasks/site
      - name: Build
        run: npm run build
        working-directory: .tasks/site
