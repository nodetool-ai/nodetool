name: Validate tasks

on:
  pull_request:
    paths:
      - ".tasks/**"
      - "scripts/tasks.mjs"
      - ".github/workflows/tasks-validate.yml"
  push:
    branches: [main]
    paths:
      - ".tasks/**"
      - "scripts/tasks.mjs"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
      - name: Validate plans and tasks
        run: node scripts/tasks.mjs validate
