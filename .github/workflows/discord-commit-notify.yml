name: Discord Commit Notify

on:
  push:
    branches:
      - main

jobs:
  notify-discord:
    name: Post merged commits to Discord
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Post commits to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_COMMIT_WEBHOOK_URL }}
          COMMITS_JSON: ${{ toJSON(github.event.commits) }}
        run: node scripts/notify-discord-commits.mjs --commits "$COMMITS_JSON"
