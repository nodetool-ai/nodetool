name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Ruby (docs)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: ./docs

      - name: Setup Node (.tasks/site)
        uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: .tasks/site/package-lock.json

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build docs with Jekyll
        run: |
          cd docs
          bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Install tasks site deps
        run: npm ci
        working-directory: .tasks/site

      - name: Build tasks site (Next.js)
        run: npm run build
        working-directory: .tasks/site
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}/tasks

      - name: Merge tasks site into docs site
        run: |
          mkdir -p docs/_site/tasks
          cp -R .tasks/site/out/. docs/_site/tasks/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./docs/_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
