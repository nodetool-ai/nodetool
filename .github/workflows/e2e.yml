name: E2E Tests

on:
  push:
    branches:
      - main
    paths:
      - "web/**"
      - "electron/**"
      - "mobile/**"
      - "packages/**"
      - ".github/workflows/e2e.yml"
  pull_request:
    branches:
      - main
    paths:
      - "web/**"
      - "electron/**"
      - "mobile/**"
      - "packages/**"
      - ".github/workflows/e2e.yml"

permissions:
  contents: read

jobs:
  electron:
    name: Electron End-to-End Tests
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: electron/package-lock.json
          check-latest: true

      - name: Set up Python (for node-gyp)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Electron dependencies
        run: |
          cd electron
          npm ci

      - name: Build @nodetool/protocol
        run: |
          cd packages/protocol
          npm install
          npm run build

      - name: Link @nodetool/protocol into electron
        if: runner.os != 'Windows'
        run: |
          mkdir -p electron/node_modules/@nodetool
          ln -s "$(pwd)/packages/protocol" electron/node_modules/@nodetool/protocol

      - name: Link @nodetool/protocol into electron (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force electron/node_modules/@nodetool -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path electron/node_modules/@nodetool
          New-Item -ItemType Junction -Path electron/node_modules/@nodetool/protocol -Target (Resolve-Path packages/protocol)

      - name: Install Playwright browsers
        run: |
          cd electron
          npx playwright install --with-deps chromium

      - name: Rebuild native modules for Electron
        run: |
          cd electron
          npx @electron/rebuild

      - name: Build Electron app
        run: |
          cd electron
          npm run vite:build
          npx tsc
        env:
          NODE_ENV: production

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd electron
          xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" npx playwright test
        env:
          CI: true

      - name: Run tests (macOS/Windows)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          cd electron
          npx playwright test
        env:
          CI: true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.os }}
          path: electron/playwright-report/
          retention-days: 7

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: electron/test-results/
          retention-days: 7
