name: E2E Tests

on:
  push:
    branches:
      - main
    paths:
      - "web/**"
      - "electron/**"
      - "mobile/**"
      - "packages/**"
      - ".github/workflows/e2e.yml"
  pull_request:
    branches:
      - main
    paths:
      - "web/**"
      - "electron/**"
      - "mobile/**"
      - "packages/**"
      - ".github/workflows/e2e.yml"

permissions:
  contents: read

jobs:
  electron:
    name: Electron End-to-End Tests
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            electron/package-lock.json
          check-latest: true

      - name: Set up Python (for node-gyp)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install root workspace dependencies
        run: npm ci

      - name: Build backend packages
        run: npm run build:packages

      - name: Install Electron dependencies
        run: |
          cd electron
          npm ci

      - name: Link workspace packages into electron
        if: runner.os != 'Windows'
        run: |
          mkdir -p electron/node_modules/@nodetool
          for pkg in packages/*/; do
            pkg_name=$(node -e "console.log(require('./${pkg}package.json').name)" 2>/dev/null) || continue
            short_name="${pkg_name#@nodetool/}"
            if [ "$short_name" != "$pkg_name" ]; then
              ln -sf "$(pwd)/${pkg}" "electron/node_modules/@nodetool/${short_name}"
            fi
          done

      - name: Link workspace packages into electron (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force electron/node_modules/@nodetool -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path electron/node_modules/@nodetool
          Get-ChildItem -Directory packages | ForEach-Object {
            $pkgJson = Join-Path $_.FullName "package.json"
            if (Test-Path $pkgJson) {
              $name = (node -e "console.log(require('./packages/$($_.Name)/package.json').name)" 2>$null)
              if ($name -and $name.StartsWith("@nodetool/")) {
                $shortName = $name.Replace("@nodetool/", "")
                New-Item -ItemType Junction -Path "electron/node_modules/@nodetool/$shortName" -Target $_.FullName -ErrorAction SilentlyContinue
              }
            }
          }

      - name: Install Playwright browsers
        run: |
          cd electron
          npx playwright install --with-deps chromium

      - name: Rebuild native modules for Electron
        run: |
          cd electron
          ELECTRON_VERSION=$(node -e "console.log(require('electron/package.json').version)")
          npx @electron/rebuild --version $ELECTRON_VERSION
        shell: bash

      - name: Build Electron app
        run: |
          cd electron
          npm run vite:build
          npx tsc
        env:
          NODE_ENV: production

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd electron
          xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" npx playwright test
        env:
          CI: true

      - name: Run tests (macOS/Windows)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          cd electron
          npx playwright test
        env:
          CI: true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.os }}
          path: electron/playwright-report/
          retention-days: 7

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: electron/test-results/
          retention-days: 7
