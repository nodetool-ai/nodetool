name: E2E Tests

on:
  push:
    branches:
      - main
    paths:
      - "web/**"
      - "electron/**"
      - "mobile/**"
      - ".github/workflows/e2e.yml"
  pull_request:
    branches:
      - main
    paths:
      - "web/**"
      - "electron/**"
      - "mobile/**"
      - ".github/workflows/e2e.yml"

permissions:
  contents: read

jobs:
  web:
    name: Web Tests
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm rebuild better-sqlite3

      - name: Build backend packages
        run: npm run build:packages

      - name: Install Playwright browsers
        run: |
          cd web
          npx playwright install --with-deps chromium

      - name: Create data directory
        run: mkdir -p $HOME/.local/share/nodetool

      - name: Start backend server
        run: |
          PORT=7777 HOST=127.0.0.1 node packages/websocket/dist/server.js > /tmp/backend-server.log 2>&1 &
          echo $! > /tmp/backend-server.pid

      - name: Wait for backend to be ready
        uses: jtalk/url-health-check-action@v4
        with:
          url: http://127.0.0.1:7777/health
          max-attempts: 30
          retry-delay: 2s

      - name: Run E2E tests
        run: |
          cd web
          npx playwright test
        env:
          CI: true
          E2E_START_BACKEND: "false"
          E2E_BACKEND_URL: "http://127.0.0.1:7777"

      - name: Stop servers
        if: always()
        run: |
          if [ -f /tmp/backend-server.pid ]; then
            kill $(cat /tmp/backend-server.pid) || true
          fi

      - name: Upload backend server logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-server-logs
          path: /tmp/backend-server.log
          retention-days: 7

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: web/test-results/
          retention-days: 7

  electron:
    name: Electron End-to-End Tests
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: "3.11"
          environment-file: environment.yml
          activate-environment: nodetool
          auto-activate-base: false
          miniforge-version: latest

      - name: Install nodetool-core and nodetool-base
        shell: bash -l {0}
        run: |
          for i in {1..3}; do
            uv pip install "fastapi==0.115.6" --extra-index-url https://nodetool-ai.github.io/nodetool-registry/simple/ --pre nodetool-core nodetool-base && break || sleep 15
          done

      - name: Verify nodetool installation
        shell: bash -l {0}
        run: |
          which nodetool
          nodetool --help

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: electron/package-lock.json
          check-latest: true

      - name: Install Electron dependencies
        run: |
          cd electron
          npm ci

      - name: Install mobile dependencies
        run: |
          cd mobile
          npm ci

      - name: Install Playwright browsers
        run: |
          cd electron
          npx playwright install --with-deps chromium

      - name: Build Electron app
        run: |
          cd electron
          npm run vite:build
          npx tsc
        env:
          NODE_ENV: production

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd electron
          xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" npx playwright test
        env:
          CI: true

      - name: Run tests (macOS/Windows)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          cd electron
          npx playwright test
        env:
          CI: true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.os }}
          path: electron/playwright-report/
          retention-days: 7

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: electron/test-results/
          retention-days: 7
