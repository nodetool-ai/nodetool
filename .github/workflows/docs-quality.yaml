name: Documentation Quality

on:
  schedule:
    - cron: "0 6 * * 1"  # Mondays at 6 AM UTC
  workflow_dispatch:

jobs:
  docs-quality:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: |
          cd web && npm ci
          cd ../electron && npm ci

      - name: Pre-flight quality check
        id: pre-check
        continue-on-error: true
        run: |
          echo "## Pre-Flight Quality Check" >> $GITHUB_STEP_SUMMARY
          TYPECHECK_EXIT=0; LINT_EXIT=0

          if make typecheck 2>&1 | tee typecheck-pre.log; then
            echo "âœ… TypeScript: OK" >> $GITHUB_STEP_SUMMARY
          else
            TYPECHECK_EXIT=1
            echo "âš ï¸ TypeScript errors found" >> $GITHUB_STEP_SUMMARY
          fi

          if make lint 2>&1 | tee lint-pre.log; then
            echo "âœ… ESLint: OK" >> $GITHUB_STEP_SUMMARY
          else
            LINT_EXIT=1
            echo "âš ï¸ Lint errors found" >> $GITHUB_STEP_SUMMARY
          fi

          echo "TYPECHECK_PRE_EXIT=$TYPECHECK_EXIT" >> $GITHUB_ENV
          echo "LINT_PRE_EXIT=$LINT_EXIT" >> $GITHUB_ENV

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: https://api.z.ai/api/anthropic
        with:
          anthropic_api_key: ${{ secrets.ZAI_API_KEY }}
          additional_permissions: |
            actions: read
          claude_args: |
            --allowedTools "Bash,WebFetch,CreatePullRequest,Edit,Read,Replace"
          prompt: |
            # Documentation Quality

            Audit and improve documentation in NodeTool (React/TypeScript visual AI workflow builder).

            ## âš ï¸ IMPORTANT: You MUST create a Pull Request
            Your job is to:
            1. Find documentation issues (outdated, incorrect, missing, or unclear docs)
            2. Fix them
            3. **Create a Pull Request with your changes**
            
            Do NOT just analyze or report findings. You must make improvements and submit a PR.

            ## Context
            - Packages: `/web`, `/electron`, `/mobile`
            - Key docs: `/AGENTS.md`, `/README.md`, `/.github/copilot-instructions.md`, `/web/README.md`, `/web/TESTING.md`
            - Each package and major directory has its own `AGENTS.md`
            - Memory: `.memory/` contains project context

            ## Before Starting â€” MANDATORY DEDUPLICATION
            1. Run `git branch -a` â€” avoid duplicating existing doc branches
            2. **Run `gh pr list --state open --limit 50`** â€” if a similar docs PR is already open, STOP and find a different area to improve
            3. Read `.memory/project-context.md` for recent changes

            ## Audit Areas
            - **Accuracy**: Do docs match current code? Fix outdated info.
            - **Completeness**: Are all features/APIs documented?
            - **Code examples**: Do they compile and work?
            - **Links**: Are all links valid?
            - **Setup instructions**: Are they correct and complete?
            - **JSDoc**: Do critical functions have documentation?

            ## Priority
            1. **Fix incorrect docs** that contradict code
            2. **Fix broken examples** and dead links
            3. **Add missing docs** for undocumented features
            4. **Improve clarity** of confusing sections

            ## Guidelines
            - Be concise â€” explain "why" not just "what"
            - Use working code examples
            - Don't document trivial/obvious code
            - Remove obsolete information

            ## Quality Checks
            For documentation changes, run typecheck and lint to ensure examples are correct:
            ```bash
            make typecheck  # Verify code examples are valid
            make lint       # Check formatting
            ```

            ## Code Review for Regressions
            After making changes, review your documentation updates:
            - Test any code examples you added or modified
            - Verify all links work correctly
            - Check that instructions are accurate
            - Ensure consistency with existing documentation style

            ## Final Step: CREATE THE PULL REQUEST
            Once you've made your documentation improvements, you MUST:
            1. Commit all your changes
            2. Push your branch
            3. **Open a Pull Request** with:
               - A clear title and description of what documentation you improved
               - Verification that any code examples work correctly

      - name: Post-change verification
        if: always()
        run: |
          echo "## Post-Change Verification" >> $GITHUB_STEP_SUMMARY
          TYPECHECK_EXIT=0; LINT_EXIT=0

          if make typecheck 2>&1 | tee typecheck-post.log; then
            echo "âœ… TypeScript: OK" >> $GITHUB_STEP_SUMMARY
          else
            TYPECHECK_EXIT=1
            echo "âŒ TypeScript errors" >> $GITHUB_STEP_SUMMARY
          fi

          if make lint 2>&1 | tee lint-post.log; then
            echo "âœ… ESLint: OK" >> $GITHUB_STEP_SUMMARY
          else
            LINT_EXIT=1
            echo "âŒ Lint errors" >> $GITHUB_STEP_SUMMARY
          fi

          # Fail if quality degraded
          if [ "$TYPECHECK_PRE_EXIT" -eq 0 ] && [ $TYPECHECK_EXIT -ne 0 ]; then
            echo "ðŸ”´ NEW TypeScript errors introduced!" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          if [ "$LINT_PRE_EXIT" -eq 0 ] && [ $LINT_EXIT -ne 0 ]; then
            echo "ðŸ”´ NEW lint errors introduced!" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
