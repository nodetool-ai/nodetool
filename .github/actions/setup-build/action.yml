name: Setup and build backend
description: >-
  Set up Node (with npm cache), install system libraries, restore the cached
  node_modules (running npm ci + native rebuild only on a miss), restore Turbo's
  build cache, and (optionally) build the backend packages. The calling job must
  check out the repository first, since this is a local composite action.

inputs:
  extra-apt:
    description: Extra apt packages to install, space-separated (e.g. CPU Vulkan driver).
    required: false
    default: ""
  build-packages:
    description: Whether to run `npm run build:packages`.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: ".nvmrc"
        cache: "npm"

    - name: Install system libraries
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y libsecret-1-0 ${{ inputs.extra-apt }}

    # Cache the installed workspace node_modules keyed on the lockfile (and Node
    # version). On a hit we skip `npm ci` and the native rebuild entirely — the
    # restored tree already has better-sqlite3 built for this runner. setup-node's
    # `cache: npm` only caches the download tarballs; this caches the linked tree.
    - name: Cache node_modules
      id: node-modules-cache
      uses: actions/cache@v5
      with:
        path: |
          node_modules
          packages/*/node_modules
          web/node_modules
          electron/node_modules
          demo/node_modules
          examples/*/node_modules
        key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json', '.nvmrc') }}

    - name: Install all workspace dependencies
      if: steps.node-modules-cache.outputs.cache-hit != 'true'
      shell: bash
      run: npm ci
      env:
        ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

    # `npm ci`'s root postinstall already rebuilds better-sqlite3 for this
    # runner's Node ABI (electron/scripts/rebuild-native.mjs). This explicit,
    # idempotent step is belt-and-suspenders in case that hook is ever skipped.
    - name: Rebuild native modules
      if: steps.node-modules-cache.outputs.cache-hit != 'true'
      shell: bash
      run: npm run rebuild:native

    # Restore Turbo's local cache so `build:packages`/`test:packages` reuse prior
    # task outputs instead of rebuilding ~55 packages from scratch in every job.
    # Keyed by commit with a prefix fallback to the latest available cache.
    #
    # Only the job that actually builds (build-packages: true) saves the cache
    # back — restore-only jobs never populate `.turbo/cache`, so if they also
    # saved, they'd race the real build job for the immutable per-SHA key: a
    # fast non-building leg that finishes first "claims" the key with a stale
    # (restore-keys-fallback) cache, and the build job's own save then fails
    # because the key already exists, leaving `test-packages` to restore that
    # stale cache and rebuild from scratch anyway.
    - name: Restore Turbo build outputs
      if: inputs.build-packages != 'true'
      uses: actions/cache/restore@v5
      with:
        path: .turbo/cache
        key: ${{ runner.os }}-turbo-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-turbo-

    - name: Cache Turbo build outputs
      if: inputs.build-packages == 'true'
      uses: actions/cache@v5
      with:
        path: .turbo/cache
        key: ${{ runner.os }}-turbo-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-turbo-

    - name: Build backend packages
      if: inputs.build-packages == 'true'
      shell: bash
      run: npm run build:packages
