<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Graph Editor - Empty State</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
    background: #0F0F0F;
    color: #F5F5F5;
    width: 390px;
    min-height: 844px;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px 8px;
    font-size: 15px;
    font-weight: 600;
  }
  .status-bar .time { font-weight: 700; }
  .status-bar .icons { display: flex; gap: 5px; align-items: center; }
  .status-bar .icons svg { width: 16px; height: 16px; fill: #F5F5F5; }

  /* Nav header */
  .nav-header {
    display: flex;
    align-items: center;
    padding: 8px 16px 12px;
    gap: 8px;
  }
  .nav-back {
    display: flex;
    align-items: center;
    gap: 2px;
    color: #6DB3F8;
    font-size: 16px;
    font-weight: 500;
  }
  .nav-back svg { width: 22px; height: 22px; fill: #6DB3F8; }
  .nav-title {
    flex: 1;
    text-align: center;
    font-size: 17px;
    font-weight: 700;
    margin-right: 48px;
  }

  /* Toolbar */
  .toolbar {
    display: flex;
    align-items: center;
    padding: 10px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    background: #161616;
    gap: 12px;
  }
  .workflow-name {
    flex: 1;
    font-size: 16px;
    font-weight: 600;
    color: #F5F5F5;
    background: none;
    border: none;
    outline: none;
  }
  .save-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 6px 12px;
    background: rgba(109, 179, 248, 0.12);
    border-radius: 8px;
    color: #6DB3F8;
    font-size: 14px;
    font-weight: 600;
    border: none;
  }
  .save-btn svg { width: 18px; height: 18px; fill: #6DB3F8; }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 120px;
    gap: 12px;
  }
  .empty-icon {
    width: 96px;
    height: 96px;
    border-radius: 28px;
    background: rgba(109, 179, 248, 0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 8px;
  }
  .empty-icon svg { width: 48px; height: 48px; fill: #6DB3F8; }
  .empty-title {
    font-size: 22px;
    font-weight: 800;
  }
  .empty-subtitle {
    font-size: 15px;
    color: #9E9E9E;
    text-align: center;
    line-height: 22px;
    padding: 0 32px;
  }
  .hero-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 16px 28px;
    background: #6DB3F8;
    border-radius: 16px;
    color: #fff;
    font-size: 17px;
    font-weight: 700;
    border: none;
    margin-top: 24px;
    box-shadow: 0 4px 16px rgba(109, 179, 248, 0.3);
  }
  .hero-btn svg { width: 28px; height: 28px; fill: #fff; }

  /* Home indicator */
  .home-indicator {
    position: fixed;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    border-radius: 3px;
    background: rgba(255,255,255,0.3);
  }
</style>
</head>
<body>
  <!-- Status bar -->
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="icons">
      <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
    </div>
  </div>

  <!-- Navigation header -->
  <div class="nav-header">
    <div class="nav-back">
      <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
    </div>
    <div class="nav-title">Workflow Editor</div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <span class="workflow-name">Untitled Workflow</span>
    <button class="save-btn">
      <svg viewBox="0 0 24 24"><path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg>
      Save
    </button>
  </div>

  <!-- Empty state -->
  <div class="empty-state">
    <div class="empty-icon">
      <svg viewBox="0 0 24 24"><path d="M22 11V3h-7v3H9V3H2v8h7V8h2v10h4v3h7v-8h-7v3h-2V8h2v3h7zM7 9H4V5h3v4zm10 6h3v4h-3v-4zm0-10h3v4h-3V5z"/></svg>
    </div>
    <div class="empty-title">Build Your Workflow</div>
    <div class="empty-subtitle">
      Add nodes to create a processing chain.<br>
      Each node's output flows into the next.
    </div>
    <button class="hero-btn">
      <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      Add First Node
    </button>
  </div>

  <div class="home-indicator"></div>
</body>
</html>
